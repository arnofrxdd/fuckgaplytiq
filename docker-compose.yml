version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8081}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: resumy-frontend
    ports:
      - "8080:3000" # Maps Host 8080 to Container 3000
    environment:
      - NODE_ENV=production
    restart: always

  backend:
    build:
      context: ./backend
    container_name: resumy-backend
    ports:
      - "8081:3001" # Maps Host 8081 to Container 3001
    env_file:
      - ./backend/.env
    restart: always
